id: web:components
title: Components
description: Create components using popular libraries and frameworks.
templates:
  - title: React.js
    files:
      - filename: App.jsx
        content: |
          export default function App() {
            return <div>Hello world</div>;
          }

  - title: React.js w/TypeScript
    files:
      - filename: App.tsx
        content: |
          export default function App() {
            return <div>Hello world</div>;
          }

  - title: React Native
    files:
      - filename: App.jsx
        content: |
          import { StyleSheet, Text, View } from "react-native";

          export default function App() {
            return (
              <View>
                <Text style={styles.text}>Hello world 🎉</Text>
              </View>
            );
          }

          const styles = StyleSheet.create({
            text: {
              fontWeight: "bold",
              fontSize: "1.5rem",
              marginVertical: "1em",
              textAlign: "center"
            }
          });

  - title: Vue.js
    files:
      - filename: App.vue
        content: |
          <template>
            <p>{{ greeting }} World!</p>
          </template>

          <script>
          export default {
            data() {
              return {
                greeting: 'Hello'
              }
            }
          }
          </script>

          <style>
          body {
            font-family: sans-serif;
          }
          </style>

  - title: Svelte
    files:
      - filename: App.svelte
        content: |
          <script>
          let name = "world";
          </script>

          <h1>Hello {name}!</h1>
          
  - title: Svelte w/TypeScript
    files:
      - filename: App.svelte
        content: |
          <script lang="ts">
          let name: string = "world";
          </script>

          <h1>Hello {name}!</h1>

  - title: Angular
    files:
      - filename: app.component.ts
        content: |
          import { Component } from '@angular/core';

          @Component({
            selector: 'app-root',
            template: `
              <div style="text-align: center; padding: 2rem;">
                <h1>Hello {{ name }}!</h1>
                <button (click)="name = 'Angular'">Click me</button>
              </div>
            `,
            styles: [`
              :host {
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
              }
            `]
          })
          export class AppComponent {
            name = 'world';
          }

  - title: Angular w/Standalone
    files:
      - filename: app.component.ts
        content: |
          import { Component } from '@angular/core';
          import { CommonModule } from '@angular/common';
          import { FormsModule } from '@angular/forms';

          @Component({
            selector: 'app-root',
            standalone: true,
            imports: [CommonModule, FormsModule],
            template: `
              <div style="text-align: center; padding: 2rem;">
                <h1>Hello {{ name }}!</h1>
                <input [(ngModel)]="name" placeholder="Enter name" />
                <button (click)="reset()">Reset</button>
              </div>
            `,
            styles: [`
              :host {
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
              }
              input {
                padding: 0.5rem;
                margin: 0 0.5rem;
                border: 1px solid #ccc;
                border-radius: 4px;
              }
              button {
                padding: 0.5rem 1rem;
                background-color: #007bff;
                color: white;
                border: none;
                border-radius: 4px;
                cursor: pointer;
              }
              button:hover {
                background-color: #0056b3;
              }
            `]
          })
          export class AppComponent {
            name = 'world';

            reset() {
              this.name = 'world';
            }
          }